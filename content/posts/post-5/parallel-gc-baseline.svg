<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="900" viewBox="0 0 1180 900" role="img" aria-label="KPipe vs Confluent PC vs Reactor Kafka vs raw KafkaConsumer + virtual threads — parallel-consumer throughput, allocation, and GC behavior">
  <defs>
    <style>
      .bg { fill: #ffffff; }
      .panel { fill: #f8fafc; stroke: #cbd5e1; stroke-width: 1; }
      .title { fill: #111827; font: 700 24px -apple-system, BlinkMacSystemFont, Segoe UI, Roboto, sans-serif; }
      .subtitle { fill: #4b5563; font: 500 14px -apple-system, BlinkMacSystemFont, Segoe UI, Roboto, sans-serif; }
      .h2 { fill: #111827; font: 700 16px -apple-system, BlinkMacSystemFont, Segoe UI, Roboto, sans-serif; }
      .h3 { fill: #1f2937; font: 700 14px -apple-system, BlinkMacSystemFont, Segoe UI, Roboto, sans-serif; }
      .axis { stroke: #9ca3af; stroke-width: 1; }
      .grid { stroke: #e5e7eb; stroke-width: 1; stroke-dasharray: 4 4; }
      .label { fill: #374151; font: 600 12px -apple-system, BlinkMacSystemFont, Segoe UI, Roboto, sans-serif; }
      .small { fill: #4b5563; font: 11px -apple-system, BlinkMacSystemFont, Segoe UI, Roboto, sans-serif; }
      .value { fill: #111827; font: 700 12px -apple-system, BlinkMacSystemFont, Segoe UI, Roboto, sans-serif; }
      .note { fill: #4b5563; font: 12px -apple-system, BlinkMacSystemFont, Segoe UI, Roboto, sans-serif; }
      .raw { fill: #14b8a6; }
      .kpipe { fill: #22c55e; }
      .reactor { fill: #8b5cf6; }
      .confluent { fill: #3b82f6; }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1180" height="900"/>

  <text x="28" y="40" class="title">ParallelProcessingBenchmark — 4-runtime competitive suite</text>
  <text x="28" y="62" class="subtitle">JMH Throughput + gc profiler. 25,000 records · 8 partitions · forks=2 · iter=5 · Testcontainers Kafka 4.2.0 · Apple Silicon 10c · JDK 25.0.2 · run 2026-05-24</text>

  <!-- Legend strip above the panel -->
  <rect x="48" y="78" width="10" height="10" class="raw"/>
  <text x="64" y="87" class="small">Raw KafkaConsumer + VT</text>
  <rect x="222" y="78" width="10" height="10" class="kpipe"/>
  <text x="238" y="87" class="small">KPipe</text>
  <rect x="288" y="78" width="10" height="10" class="reactor"/>
  <text x="304" y="87" class="small">Reactor Kafka 1.3.25</text>
  <rect x="430" y="78" width="10" height="10" class="confluent"/>
  <text x="446" y="87" class="small">Confluent Parallel Consumer</text>

  <!-- Throughput panel — 3 grouped bars per workMicros cell -->
  <rect x="28" y="100" width="1124" height="360" class="panel"/>
  <text x="48" y="128" class="h2">Throughput across workMicros sweep (records / second, higher is better)</text>

  <!-- Y axis: max ~600k, panel chart area y=160..400 -->
  <line x1="120" y1="400" x2="1140" y2="400" class="axis"/>
  <line x1="120" y1="160" x2="120" y2="400" class="axis"/>

  <!-- Y gridlines + ticks (0, 100k, 200k, 300k, 400k, 500k, 600k) -->
  <line x1="120" y1="360" x2="1140" y2="360" class="grid"/>
  <line x1="120" y1="320" x2="1140" y2="320" class="grid"/>
  <line x1="120" y1="280" x2="1140" y2="280" class="grid"/>
  <line x1="120" y1="240" x2="1140" y2="240" class="grid"/>
  <line x1="120" y1="200" x2="1140" y2="200" class="grid"/>
  <line x1="120" y1="160" x2="1140" y2="160" class="grid"/>

  <text x="115" y="404" class="small" text-anchor="end">0</text>
  <text x="115" y="364" class="small" text-anchor="end">100k</text>
  <text x="115" y="324" class="small" text-anchor="end">200k</text>
  <text x="115" y="284" class="small" text-anchor="end">300k</text>
  <text x="115" y="244" class="small" text-anchor="end">400k</text>
  <text x="115" y="204" class="small" text-anchor="end">500k</text>
  <text x="115" y="164" class="small" text-anchor="end">600k</text>

  <!-- 3 groups: workMicros=0 (x~200), =100 (x~540), =1000 (x~880). Each group has 4 bars, 40px wide, 4px gap. -->
  <!-- y = 400 - round(score / 600000 * 240) -->

  <!-- GROUP 1: workMicros=0 -->
  <!-- Raw 557439 → h=223 -->
  <rect x="200" y="177" width="40" height="223" class="raw"/>
  <text x="220" y="172" class="value" text-anchor="middle">557k</text>
  <!-- KPipe 542412 → h=217 -->
  <rect x="244" y="183" width="40" height="217" class="kpipe"/>
  <text x="264" y="178" class="value" text-anchor="middle">542k</text>
  <!-- Reactor 150081 → h=60 -->
  <rect x="288" y="340" width="40" height="60" class="reactor"/>
  <text x="308" y="335" class="value" text-anchor="middle">150k</text>
  <!-- Confluent 109952 → h=44 -->
  <rect x="332" y="356" width="40" height="44" class="confluent"/>
  <text x="352" y="351" class="value" text-anchor="middle">110k</text>

  <text x="286" y="425" class="label" text-anchor="middle">workMicros = 0</text>
  <text x="286" y="442" class="small" text-anchor="middle">pure framework overhead</text>

  <!-- GROUP 2: workMicros=100 (offset +340) -->
  <!-- Raw 520859 → h=208 -->
  <rect x="540" y="192" width="40" height="208" class="raw"/>
  <text x="560" y="187" class="value" text-anchor="middle">521k</text>
  <!-- KPipe 490543 → h=196 -->
  <rect x="584" y="204" width="40" height="196" class="kpipe"/>
  <text x="604" y="199" class="value" text-anchor="middle">491k</text>
  <!-- Reactor 72595 → h=29 -->
  <rect x="628" y="371" width="40" height="29" class="reactor"/>
  <text x="648" y="366" class="value" text-anchor="middle">73k</text>
  <!-- Confluent 114362 → h=46 -->
  <rect x="672" y="354" width="40" height="46" class="confluent"/>
  <text x="692" y="349" class="value" text-anchor="middle">114k</text>

  <text x="626" y="425" class="label" text-anchor="middle">workMicros = 100</text>
  <text x="626" y="442" class="small" text-anchor="middle">local enrichment</text>

  <!-- GROUP 3: workMicros=1000 (offset +340 again) -->
  <!-- Raw 417920 → h=167 -->
  <rect x="880" y="233" width="40" height="167" class="raw"/>
  <text x="900" y="228" class="value" text-anchor="middle">418k</text>
  <!-- KPipe 483061 → h=193  (KPipe AHEAD of Raw at this cell) -->
  <rect x="924" y="207" width="40" height="193" class="kpipe"/>
  <text x="944" y="202" class="value" text-anchor="middle">483k</text>
  <!-- Reactor 9079 → h=4 (tiny — emphasise with label outside) -->
  <rect x="968" y="396" width="40" height="4" class="reactor"/>
  <text x="988" y="391" class="value" text-anchor="middle" fill="#7c3aed">9k ⚠</text>
  <!-- Confluent 67726 → h=27 -->
  <rect x="1012" y="373" width="40" height="27" class="confluent"/>
  <text x="1032" y="368" class="value" text-anchor="middle">68k</text>

  <text x="966" y="425" class="label" text-anchor="middle">workMicros = 1000</text>
  <text x="966" y="442" class="small" text-anchor="middle">blocking I/O round trip</text>

  <!-- Cost Profile section -->
  <text x="28" y="500" class="h2">Cost profile at workMicros=0 (allocation and GC)</text>

  <!-- Panel 1: gc.alloc.rate.norm B/op -->
  <rect x="28" y="516" width="378" height="220" class="panel"/>
  <text x="48" y="540" class="h3">gc.alloc.rate.norm (B/op)</text>
  <text x="48" y="557" class="small">bytes allocated per record · lower is better</text>

  <line x1="76" y1="710" x2="386" y2="710" class="axis"/>
  <line x1="76" y1="580" x2="76" y2="710" class="axis"/>

  <!-- max 1000 B/op, scale = 0.13 px/B -->
  <rect x="100" y="706" width="50" height="4" class="confluent"/>
  <text x="125" y="700" class="value" text-anchor="middle">34</text>
  <text x="125" y="728" class="small" text-anchor="middle">Conf.</text>

  <rect x="160" y="703" width="50" height="7" class="raw"/>
  <text x="185" y="697" class="value" text-anchor="middle">55</text>
  <text x="185" y="728" class="small" text-anchor="middle">Raw</text>

  <rect x="220" y="689" width="50" height="21" class="reactor"/>
  <text x="245" y="683" class="value" text-anchor="middle">162</text>
  <text x="245" y="728" class="small" text-anchor="middle">Reactor</text>

  <rect x="280" y="590" width="50" height="120" class="kpipe"/>
  <text x="305" y="584" class="value" text-anchor="middle">924</text>
  <text x="305" y="728" class="small" text-anchor="middle">KPipe</text>

  <!-- Panel 2: gc.count (max scaled to 400 because Confluent at 372 is now the tallest) -->
  <rect x="416" y="516" width="378" height="220" class="panel"/>
  <text x="436" y="540" class="h3">gc.count (events during measurement)</text>
  <text x="436" y="557" class="small">lower is better</text>

  <line x1="464" y1="710" x2="774" y2="710" class="axis"/>
  <line x1="464" y1="580" x2="464" y2="710" class="axis"/>

  <!-- max ~400, scale = 0.325 px/event -->
  <rect x="488" y="680" width="50" height="30" class="raw"/>
  <text x="513" y="674" class="value" text-anchor="middle">93</text>
  <text x="513" y="728" class="small" text-anchor="middle">Raw</text>

  <rect x="548" y="678" width="50" height="32" class="kpipe"/>
  <text x="573" y="672" class="value" text-anchor="middle">98</text>
  <text x="573" y="728" class="small" text-anchor="middle">KPipe</text>

  <rect x="608" y="667" width="50" height="43" class="reactor"/>
  <text x="633" y="661" class="value" text-anchor="middle">131</text>
  <text x="633" y="728" class="small" text-anchor="middle">Reactor</text>

  <rect x="668" y="589" width="50" height="121" class="confluent"/>
  <text x="693" y="583" class="value" text-anchor="middle">372</text>
  <text x="693" y="728" class="small" text-anchor="middle">Conf.</text>

  <!-- Panel 3: gc.time ms -->
  <rect x="804" y="516" width="348" height="220" class="panel"/>
  <text x="824" y="540" class="h3">gc.time (ms during measurement)</text>
  <text x="824" y="557" class="small">lower is better</text>

  <line x1="836" y1="710" x2="1130" y2="710" class="axis"/>
  <line x1="836" y1="580" x2="836" y2="710" class="axis"/>

  <!-- max ~800, scale = 0.1625 px/ms -->
  <rect x="858" y="692" width="50" height="18" class="raw"/>
  <text x="883" y="686" class="value" text-anchor="middle">110</text>
  <text x="883" y="728" class="small" text-anchor="middle">Raw</text>

  <rect x="918" y="689" width="50" height="21" class="kpipe"/>
  <text x="943" y="683" class="value" text-anchor="middle">132</text>
  <text x="943" y="728" class="small" text-anchor="middle">KPipe</text>

  <rect x="978" y="632" width="50" height="78" class="confluent"/>
  <text x="1003" y="626" class="value" text-anchor="middle">482</text>
  <text x="1003" y="728" class="small" text-anchor="middle">Conf.</text>

  <rect x="1038" y="619" width="50" height="91" class="reactor"/>
  <text x="1063" y="613" class="value" text-anchor="middle">558</text>
  <text x="1063" y="728" class="small" text-anchor="middle">Reactor</text>

  <!-- Summary panel -->
  <rect x="28" y="754" width="1124" height="130" class="panel"/>
  <text x="48" y="780" class="h2">Summary</text>

  <text x="48" y="804" class="note">• KPipe matches raw Loom at light workloads and beats it under blocking work: within 3–6% of Raw at workMicros=0..100, and ~16% ahead of Raw at workMicros=1000.</text>
  <text x="48" y="824" class="note">• Reactor Kafka collapses under blocking work: 150k → 73k → 9k ops/sec as workMicros grows. At workMicros=1000 it is 53× slower than KPipe and 7.5× slower than Confluent.</text>
  <text x="48" y="844" class="note">• KPipe degrades gracefully (542k → 491k → 483k). Virtual threads scale beyond the partition count; each blocked record costs only kilobytes of stack.</text>
  <text x="48" y="864" class="note">• KPipe allocates ~924 B/op vs Confluent's 34 B/op — most in the table. At this throughput the JVM's young gen absorbs it without depressing ops/sec. Watch on tight heaps.</text>
</svg>
