<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="520" viewBox="0 0 1100 520" role="img" aria-label="Parallel consumer throughput at workMicros=0">
  <defs>
    <style>
      .bg { fill: #ffffff; }
      .panel { fill: #f8fafc; stroke: #cbd5e1; stroke-width: 1; }
      .title { fill: #111827; font: 700 22px -apple-system, BlinkMacSystemFont, Segoe UI, Roboto, sans-serif; }
      .subtitle { fill: #4b5563; font: 500 13px -apple-system, BlinkMacSystemFont, Segoe UI, Roboto, sans-serif; }
      .axis { stroke: #9ca3af; stroke-width: 1; }
      .grid { stroke: #e5e7eb; stroke-width: 1; stroke-dasharray: 4 4; }
      .label { fill: #1f2937; font: 600 14px -apple-system, BlinkMacSystemFont, Segoe UI, Roboto, sans-serif; }
      .value { fill: #ffffff; font: 700 13px -apple-system, BlinkMacSystemFont, Segoe UI, Roboto, sans-serif; }
      .tick { fill: #6b7280; font: 11px -apple-system, BlinkMacSystemFont, Segoe UI, Roboto, sans-serif; }
      .note { fill: #4b5563; font: 12px -apple-system, BlinkMacSystemFont, Segoe UI, Roboto, sans-serif; }
      .footer { fill: #6b7280; font: 11px -apple-system, BlinkMacSystemFont, Segoe UI, Roboto, sans-serif; }
      .kpipe { fill: #22c55e; }
      .raw { fill: #14b8a6; }
      .reactor { fill: #8b5cf6; }
      .confluent { fill: #3b82f6; }
      .prelim { fill: #c4b5fd; }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1100" height="520"/>

  <text x="40" y="40" class="title">Parallel-consumer throughput at workMicros=0</text>
  <text x="40" y="62" class="subtitle">Records / second processed, higher is better. Testcontainers Kafka 4.2.0 · 25k records · 8 partitions · JMH forks=2 × iter=5 · Apple Silicon 10c · JDK 25.0.2</text>

  <rect x="40" y="90" width="1020" height="350" class="panel"/>

  <!-- gridlines + ticks 0..600000 -->
  <line x1="240" y1="120" x2="240" y2="410" class="axis"/>
  <line x1="240" y1="410" x2="1040" y2="410" class="axis"/>

  <line x1="373" y1="120" x2="373" y2="410" class="grid"/>
  <line x1="507" y1="120" x2="507" y2="410" class="grid"/>
  <line x1="640" y1="120" x2="640" y2="410" class="grid"/>
  <line x1="773" y1="120" x2="773" y2="410" class="grid"/>
  <line x1="907" y1="120" x2="907" y2="410" class="grid"/>
  <line x1="1040" y1="120" x2="1040" y2="410" class="grid"/>

  <text x="240" y="430" class="tick" text-anchor="middle">0</text>
  <text x="373" y="430" class="tick" text-anchor="middle">100k</text>
  <text x="507" y="430" class="tick" text-anchor="middle">200k</text>
  <text x="640" y="430" class="tick" text-anchor="middle">300k</text>
  <text x="773" y="430" class="tick" text-anchor="middle">400k</text>
  <text x="907" y="430" class="tick" text-anchor="middle">500k</text>
  <text x="1040" y="430" class="tick" text-anchor="middle">600k</text>
  <text x="640" y="455" class="note" text-anchor="middle">records / second (one record = one JMH op via @OperationsPerInvocation)</text>

  <!-- Raw KafkaConsumer + VT — 570,890 (1.0 px = ~545 ops/s) -->
  <rect x="240" y="140" width="763" height="40" class="raw"/>
  <text x="230" y="166" class="label" text-anchor="end">Raw KafkaConsumer + VT</text>
  <text x="990" y="166" class="value" text-anchor="end">570,890 ± 38,369</text>

  <!-- KPipe — 553,704 -->
  <rect x="240" y="195" width="740" height="40" class="kpipe"/>
  <text x="230" y="221" class="label" text-anchor="end">KPipe</text>
  <text x="967" y="221" class="value" text-anchor="end">553,704 ± 54,924</text>

  <!-- Reactor Kafka — ~300,000 (preliminary, lighter shade) -->
  <rect x="240" y="250" width="400" height="40" class="prelim"/>
  <text x="230" y="276" class="label" text-anchor="end">Reactor Kafka</text>
  <text x="627" y="276" class="value" text-anchor="end">~300,000 (preliminary)</text>

  <!-- Confluent Parallel Consumer — 107,877 -->
  <rect x="240" y="305" width="144" height="40" class="confluent"/>
  <text x="230" y="331" class="label" text-anchor="end">Confluent Parallel Consumer</text>
  <text x="394" y="335" class="note" text-anchor="start">  107,877 ± 8,892</text>

  <!-- Legend / takeaway -->
  <text x="60" y="385" class="note">KPipe ≈ raw KafkaConsumer + virtual threads within error.  Both Loom runtimes ≈ 5× Confluent.  Reactor sits between Confluent and the Loom row at ≈ 3× Confluent.</text>

  <text x="40" y="490" class="footer">Raw JMH JSON: benchmarks/results/2026-05-16.json.  Reactor row is a single smoke iteration at workMicros=0 — full sweep pending and will replace this graph when complete.</text>
  <text x="40" y="506" class="footer">"Records / second" here is direct, not "ops × @OperationsPerInvocation": JMH's @OperationsPerInvocation(25000) normalises automatically so the printed ops/s is the record rate.</text>
</svg>
